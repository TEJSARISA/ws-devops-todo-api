name: CI-CD

on:
  push:
    branches:
      - main

env:
  APP_DIR: app
  INFRA_DIR: infra
  LOCAL_IMAGE_NAME: ws-devops-todo-api
  AWS_REGION: ap-south-1

jobs:
  build-test-publish:
    runs-on: ubuntu-latest
    outputs:
      deploy_ready: ${{ steps.release-flags.outputs.deploy_ready }}
      image_name: ${{ steps.release-flags.outputs.image_name }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Determine optional release steps
        id: release-flags
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ]; then
            echo "docker_ready=true" >> "$GITHUB_OUTPUT"
            echo "image_name=${DOCKER_USERNAME}/ws-devops-todo-api" >> "$GITHUB_OUTPUT"
          else
            echo "docker_ready=false" >> "$GITHUB_OUTPUT"
            echo "image_name=ws-devops-todo-api" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$DOCKER_USERNAME" ] && [ -n "$DOCKER_PASSWORD" ] && [ -n "$EC2_HOST" ] && [ -n "$EC2_USER" ] && [ -n "$EC2_SSH_KEY" ]; then
            echo "deploy_ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "deploy_ready=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Validate Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init
        run: terraform -chdir=${{ env.INFRA_DIR }} init -backend=false

      - name: Terraform validate
        run: terraform -chdir=${{ env.INFRA_DIR }} validate

      - name: Run tests
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B clean test

      - name: Build JAR
        working-directory: ${{ env.APP_DIR }}
        run: mvn -B package -DskipTests

      - name: Build Docker image
        run: |
          docker build \
            -f ${{ env.APP_DIR }}/Dockerfile \
            -t $LOCAL_IMAGE_NAME:latest \
            -t $LOCAL_IMAGE_NAME:${{ github.sha }} \
            ${{ env.APP_DIR }}

      - name: Login to DockerHub
        if: steps.release-flags.outputs.docker_ready == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Tag Docker image for registry
        if: steps.release-flags.outputs.docker_ready == 'true'
        run: |
          docker tag $LOCAL_IMAGE_NAME:latest ${{ steps.release-flags.outputs.image_name }}:latest
          docker tag $LOCAL_IMAGE_NAME:${{ github.sha }} ${{ steps.release-flags.outputs.image_name }}:${{ github.sha }}

      - name: Push Docker image
        if: steps.release-flags.outputs.docker_ready == 'true'
        run: |
          docker push ${{ steps.release-flags.outputs.image_name }}:latest
          docker push ${{ steps.release-flags.outputs.image_name }}:${{ github.sha }}

      - name: Skip Docker publish when credentials are missing
        if: steps.release-flags.outputs.docker_ready != 'true'
        run: echo "Docker Hub secrets are not configured. Skipping image publish."

  deploy:
    runs-on: ubuntu-latest
    needs: build-test-publish
    if: needs.build-test-publish.outputs.deploy_ready == 'true'

    steps:
      - name: Deploy to EC2 over SSH
        uses: appleboy/ssh-action@v1.2.0
        env:
          IMAGE_NAME: ${{ needs.build-test-publish.outputs.image_name }}
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
          IMAGE_TAG: ${{ github.sha }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          envs: IMAGE_NAME,DOCKER_USERNAME,DOCKER_PASSWORD,IMAGE_TAG
          script: |
            set -euo pipefail
            echo "$DOCKER_PASSWORD" | docker login --username "$DOCKER_USERNAME" --password-stdin
            mkdir -p /opt/ws-devops-todo-api

            if [ ! -f /opt/ws-devops-todo-api/.env ]; then
              echo "Missing /opt/ws-devops-todo-api/.env. Provision the EC2 instance with Terraform first."
              exit 1
            fi

            set -a
            . /opt/ws-devops-todo-api/.env
            set +a

            docker network inspect ws-todo-network >/dev/null 2>&1 || docker network create ws-todo-network
            docker volume inspect ws-todo-postgres-data >/dev/null 2>&1 || docker volume create ws-todo-postgres-data

            if ! docker ps -a --format '{{.Names}}' | grep -q '^ws-todo-postgres$'; then
              docker run -d \
                --name ws-todo-postgres \
                --restart unless-stopped \
                --network ws-todo-network \
                -e POSTGRES_DB="$POSTGRES_DB" \
                -e POSTGRES_USER="$POSTGRES_USER" \
                -e POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
                -v ws-todo-postgres-data:/var/lib/postgresql/data \
                postgres:16-alpine
            else
              docker start ws-todo-postgres >/dev/null 2>&1 || true
            fi

            until docker exec ws-todo-postgres pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"; do
              sleep 3
            done

            docker pull "$IMAGE_NAME:$IMAGE_TAG"
            docker rm -f ws-devops-todo-api >/dev/null 2>&1 || true

            docker run -d \
              --name ws-devops-todo-api \
              --restart unless-stopped \
              --network ws-todo-network \
              -p "${APP_PORT:-8080}:8080" \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e SPRING_DATASOURCE_URL="jdbc:postgresql://ws-todo-postgres:5432/$POSTGRES_DB" \
              -e SPRING_DATASOURCE_USERNAME="$POSTGRES_USER" \
              -e SPRING_DATASOURCE_PASSWORD="$POSTGRES_PASSWORD" \
              -e JWT_SECRET="$JWT_SECRET" \
              -e JWT_EXPIRATION_MINUTES="${JWT_EXPIRATION_MINUTES:-60}" \
              -e APP_ADMIN_EMAILS="${APP_ADMIN_EMAILS:-admin@ws.local}" \
              -e APP_CORS_ALLOWED_ORIGINS="${APP_CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:8080}" \
              "$IMAGE_NAME:$IMAGE_TAG"
