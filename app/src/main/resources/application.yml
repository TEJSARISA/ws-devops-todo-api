server:
  port: ${SERVER_PORT:8080}
  forward-headers-strategy: framework

spring:
  application:
    name: ws-devops-todo-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/todo_db}
    username: ${SPRING_DATASOURCE_USERNAME:todo_user}
    password: ${SPRING_DATASOURCE_PASSWORD:todo_password}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when_authorized
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true

info:
  app:
    name: WS DevOps To-Do API
    description: Cloud-native To-Do API demonstrating Spring Boot, Docker, Terraform, and AWS deployment.
    version: 1.0.0

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
    tagsSorter: alpha

app:
  security:
    jwt:
      secret: ${JWT_SECRET:TXktd3MtZGV2b3BzLXRvZG8tYXBpLWJhc2U2NC1zZWNyZXQtbXVzdC1iZS1vdmVycmlkZGVuLXRvLXByb2Q=}
      expiration-minutes: ${JWT_EXPIRATION_MINUTES:60}
    admin-emails: ${APP_ADMIN_EMAILS:admin@ws.local}
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080}
