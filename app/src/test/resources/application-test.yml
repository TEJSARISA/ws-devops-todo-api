spring:
  datasource:
    url: jdbc:h2:mem:todo_test;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_LOWER=TRUE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
  flyway:
    enabled: false

app:
  security:
    jwt:
      secret: ZGV2LXRlc3Qtc2VjcmV0LW11c3QtYmUtYmFzZTY0LWZvci1qd3Qtc2lnbmluZw==
      expiration-minutes: 60
    admin-emails: admin@ws.local
  cors:
    allowed-origins: http://localhost:3000,http://localhost:8080
