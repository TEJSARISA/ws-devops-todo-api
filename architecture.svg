<svg width="1600" height="920" viewBox="0 0 1600 920" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">WS DevOps To-Do API architecture diagram</title>
  <desc id="desc">Static architecture diagram showing clients, CloudFront, AWS ALB, EC2 Docker host, Spring Boot API, PostgreSQL, GitHub Actions, Docker Hub, and Terraform.</desc>
  <defs>
    <linearGradient id="bg" x1="120" y1="80" x2="1480" y2="840" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F172A"/>
      <stop offset="1" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="220" y1="210" x2="1320" y2="210" gradientUnits="userSpaceOnUse">
      <stop stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#22C55E"/>
    </linearGradient>
    <filter id="shadow" x="-40" y="-40" width="1680" height="1000" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="16" stdDeviation="20" flood-color="#020617" flood-opacity="0.35"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#94A3B8"/>
    </marker>
    <marker id="greenArrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M0 0L12 6L0 12V0Z" fill="#22C55E"/>
    </marker>
  </defs>

  <rect width="1600" height="920" rx="36" fill="url(#bg)"/>
  <rect x="48" y="44" width="1504" height="832" rx="28" fill="#0B1220" stroke="#1E293B"/>
  <rect x="48" y="44" width="1504" height="104" rx="28" fill="#0F172A"/>
  <rect x="48" y="112" width="1504" height="36" fill="#0F172A"/>
  <circle cx="92" cy="96" r="8" fill="#FB7185"/>
  <circle cx="120" cy="96" r="8" fill="#F59E0B"/>
  <circle cx="148" cy="96" r="8" fill="#22C55E"/>
  <text x="220" y="92" fill="#E2E8F0" font-size="38" font-family="Arial, Helvetica, sans-serif" font-weight="700">WS DevOps To-Do API</text>
  <text x="220" y="126" fill="#94A3B8" font-size="20" font-family="Arial, Helvetica, sans-serif">Cloud-native backend, container delivery, CI/CD automation, and AWS edge-to-origin deployment</text>

  <rect x="118" y="176" width="1364" height="298" rx="28" fill="#0F172A" stroke="#1E293B"/>
  <rect x="118" y="508" width="1364" height="288" rx="28" fill="#0F172A" stroke="#1E293B"/>
  <text x="148" y="220" fill="#F8FAFC" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Runtime Request Path</text>
  <text x="148" y="548" fill="#F8FAFC" font-size="24" font-family="Arial, Helvetica, sans-serif" font-weight="700">Delivery and Provisioning Flow</text>
  <rect x="148" y="240" width="1304" height="6" rx="3" fill="url(#accent)"/>

  <g filter="url(#shadow)">
    <rect x="148" y="284" width="190" height="138" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="380" y="284" width="210" height="138" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="640" y="284" width="230" height="138" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="920" y="254" width="260" height="198" rx="28" fill="#111827" stroke="#334155"/>
    <rect x="950" y="294" width="200" height="62" rx="18" fill="#0F172A" stroke="#334155"/>
    <rect x="950" y="372" width="200" height="50" rx="18" fill="#0F172A" stroke="#334155"/>
    <rect x="1222" y="284" width="200" height="138" rx="24" fill="#111827" stroke="#334155"/>
  </g>

  <text x="178" y="332" fill="#E2E8F0" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">Clients</text>
  <text x="178" y="366" fill="#94A3B8" font-size="19" font-family="Arial, Helvetica, sans-serif">Browser, Postman,</text>
  <text x="178" y="392" fill="#94A3B8" font-size="19" font-family="Arial, Helvetica, sans-serif">mobile, or CLI</text>

  <text x="410" y="332" fill="#E2E8F0" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">CloudFront</text>
  <text x="410" y="366" fill="#94A3B8" font-size="19" font-family="Arial, Helvetica, sans-serif">Global CDN edge</text>
  <text x="410" y="392" fill="#94A3B8" font-size="19" font-family="Arial, Helvetica, sans-serif">TLS termination</text>

  <text x="670" y="332" fill="#E2E8F0" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">AWS ALB</text>
  <text x="670" y="366" fill="#94A3B8" font-size="19" font-family="Arial, Helvetica, sans-serif">HTTP routing</text>
  <text x="670" y="392" fill="#94A3B8" font-size="19" font-family="Arial, Helvetica, sans-serif">Health checks</text>

  <text x="952" y="294" fill="#E2E8F0" font-size="30" font-family="Arial, Helvetica, sans-serif" font-weight="700">EC2 Docker Host</text>
  <text x="952" y="328" fill="#94A3B8" font-size="19" font-family="Arial, Helvetica, sans-serif">Ubuntu + Docker bootstrap</text>
  <text x="982" y="332" fill="#F8FAFC" font-size="22" font-family="Arial, Helvetica, sans-serif" font-weight="700">Spring Boot API</text>
  <text x="982" y="392" fill="#F8FAFC" font-size="20" font-family="Arial, Helvetica, sans-serif" font-weight="700">Optional Nginx + docker compose</text>

  <text x="1252" y="332" fill="#E2E8F0" font-size="28" font-family="Arial, Helvetica, sans-serif" font-weight="700">PostgreSQL</text>
  <text x="1252" y="366" fill="#94A3B8" font-size="19" font-family="Arial, Helvetica, sans-serif">Persistent store</text>
  <text x="1252" y="392" fill="#94A3B8" font-size="19" font-family="Arial, Helvetica, sans-serif">Todo and user data</text>

  <line x1="338" y1="353" x2="380" y2="353" stroke="#94A3B8" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="590" y1="353" x2="640" y2="353" stroke="#94A3B8" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="870" y1="353" x2="920" y2="353" stroke="#94A3B8" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1180" y1="353" x2="1222" y2="353" stroke="#94A3B8" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1110" y1="422" x2="1110" y2="470" stroke="#22C55E" stroke-width="4" stroke-dasharray="10 10"/>
  <text x="1140" y="450" fill="#86EFAC" font-size="17" font-family="Arial, Helvetica, sans-serif">Actuator health probe for ALB target group</text>

  <g filter="url(#shadow)">
    <rect x="148" y="586" width="210" height="152" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="402" y="586" width="250" height="152" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="700" y="586" width="190" height="152" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="944" y="586" width="210" height="152" rx="24" fill="#111827" stroke="#334155"/>
    <rect x="1204" y="586" width="220" height="152" rx="24" fill="#111827" stroke="#334155"/>
  </g>

  <text x="178" y="636" fill="#E2E8F0" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">GitHub Repo</text>
  <text x="178" y="670" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">Source, README,</text>
  <text x="178" y="695" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">workflow, infra</text>

  <text x="432" y="636" fill="#E2E8F0" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">GitHub Actions</text>
  <text x="432" y="670" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">Tests, terraform validate,</text>
  <text x="432" y="695" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">jar build, docker publish</text>

  <text x="730" y="636" fill="#E2E8F0" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Docker Hub</text>
  <text x="730" y="670" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">Versioned image</text>
  <text x="730" y="695" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">distribution</text>

  <text x="974" y="636" fill="#E2E8F0" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">Terraform</text>
  <text x="974" y="670" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">VPC, subnets, ALB,</text>
  <text x="974" y="695" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">EC2, CloudFront</text>

  <text x="1234" y="636" fill="#E2E8F0" font-size="26" font-family="Arial, Helvetica, sans-serif" font-weight="700">AWS Runtime</text>
  <text x="1234" y="670" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">Provisioned foundation</text>
  <text x="1234" y="695" fill="#94A3B8" font-size="18" font-family="Arial, Helvetica, sans-serif">and rolling deploy target</text>

  <line x1="358" y1="662" x2="402" y2="662" stroke="#94A3B8" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="652" y1="662" x2="700" y2="662" stroke="#94A3B8" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="890" y1="662" x2="944" y2="662" stroke="#94A3B8" stroke-width="5" marker-end="url(#arrow)"/>
  <line x1="1154" y1="662" x2="1204" y2="662" stroke="#94A3B8" stroke-width="5" marker-end="url(#arrow)"/>

  <path d="M526 586C526 498 688 492 1050 492C1320 492 1330 456 1330 422" stroke="#22C55E" stroke-width="4" stroke-dasharray="12 12" marker-end="url(#greenArrow)"/>
  <text x="696" y="522" fill="#86EFAC" font-size="18" font-family="Arial, Helvetica, sans-serif">CI pulls latest image to EC2 and restarts the application container</text>

  <path d="M1050 586C1050 514 1050 498 1050 470" stroke="#38BDF8" stroke-width="4" stroke-dasharray="10 10" marker-end="url(#arrow)"/>
  <text x="1080" y="530" fill="#7DD3FC" font-size="18" font-family="Arial, Helvetica, sans-serif">Infrastructure managed as code</text>

  <rect x="118" y="820" width="1364" height="34" rx="17" fill="#0F172A" stroke="#1E293B"/>
  <text x="148" y="843" fill="#94A3B8" font-size="17" font-family="Arial, Helvetica, sans-serif">Secure API with JWT, Dockerized deployment, ALB health checks, CDN edge caching, and observability-ready actuator endpoints</text>
</svg>
